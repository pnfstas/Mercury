# Базовые настройки Kotlin и Android
kotlin.code.style=official
android.nonTransitiveRClass=true
android.useAndroidX=true

# Фиксация стабильной Java 25 без скачивания чужих JDK
org.gradle.daemon.jvm.criteria.version=25
kotlin.jvm.toolchain.launcher.enabled=false
kotlin.native.toolchain.enabled=false
org.gradle.java.installations.auto-download=true
org.gradle.java.installations.auto-detect=true

# Настройки глубокой памяти ОЗУ и Metaspace (Защита от OutOfMemory)
org.gradle.jvmargs=-Xmx1024m -XX:MetaspaceSize=512m -XX:MaxMetaspaceSize=2048m -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx1024m
org.gradle.workers.max=1
kotlin.native.disableCompilerDaemon=false

# ОФИЦИАЛЬНЫЙ ФЛАГ JETBRAINS ДЛЯ ОТКЛЮЧЕНИЯ КЭША COMPOSE UI
# Он принудительно запретит сборку сбойного ui.klib в режиме кэширования
compose.ios.uikit.cache.disabled=true

# Отключение кэшей (Финальный рабочий синтаксис)
#kotlin.native.cacheKind=none
org.gradle.configuration-cache=false
org.gradle.caching=false
